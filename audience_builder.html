<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audience Builder</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #f1f5f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eff6ff;
    }

    .page-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px;
    }

    .hero {
      width: 100%;
      border-radius: 18px;
      background: #0f172a;
      padding: 32px;
      color: white;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.7rem);
      line-height: 1.1;
    }

    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .back-button {
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .panel {
      margin-top: 24px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .steps {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0;
      margin-bottom: 30px;
      padding: 0 12px;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      background: #e2e8f0;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
    }

    .steps::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 12px;
      height: 6px;
      background: #2563eb;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
      width: 28%;
    }

    .steps.progress-1::after {
      width: 8%;
    }

    .steps.progress-3::after {
      width: 52%;
    }

    .steps.progress-4::after {
      width: 76%;
    }

    .steps.progress-5::after {
      width: 100%;
    }

    .step {
      position: relative;
      flex: 1;
      text-align: center;
      color: #94a3b8;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .step-indicator {
      position: relative;
      z-index: 2;
      width: 34px;
      height: 34px;
      margin: 0 auto 10px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #475569;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.65);
    }

    .step.active .step-indicator,
    .step.active {
      color: #2563eb;
    }

    .step.active .step-indicator {
      background: #2563eb;
      color: white;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.25fr 1.25fr 0.9fr;
      gap: 24px;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 20px;
      font-size: 1.1rem;
      color: #0f172a;
    }

    .subtle-button {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: white;
      color: #1e293b;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .subtle-button:hover {
      background: #eef2ff;
      border-color: #93c5fd;
    }

    .brand-list {
      display: grid;
      gap: 12px;
    }

    .brand-item {
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: white;
      padding: 16px 18px;
      color: #475569;
      font-weight: 600;
    }

    .profile-card {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: #475569;
      font-size: 0.98rem;
    }

    .profile-card button {
      width: 100%;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      background: transparent;
      color: #334155;
      padding: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .profile-card button:hover {
      background: #eff6ff;
      border-color: #93c5fd;
    }

    .summary-card {
      border: 1px solid #cbd5e1;
      border-radius: 20px;
      background: white;
      padding: 24px;
      display: grid;
      gap: 22px;
      text-align: center;
    }

    .summary-card h2 {
      margin: 0;
      font-size: 1.05rem;
      color: #1e293b;
    }

    .summary-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      border-radius: 999px;
      border: 10px solid #e2e8f0;
      display: grid;
      place-items: center;
      color: #0f172a;
      font-size: 2rem;
      font-weight: 800;
    }

    .summary-footnote {
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      color: #475569;
      font-size: 0.95rem;
    }

    .summary-footnote strong {
      display: block;
      margin-bottom: 8px;
      color: #0f172a;
      font-size: 1rem;
    }

    @media (max-width: 980px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 20px;
      }

      .steps {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <div class="hero-header">
        <h1>Audience Builder</h1>
        <button type="button" class="back-button" onclick="window.location.href='campaign_creation.html'">Back to Campaign Creation</button>
      </div>
    </section>

    <section class="panel">
      <div class="steps progress-2">
        <div class="step active">
          <div class="step-indicator">1</div>
          <div>Details</div>
        </div>
        <div class="step active">
          <div class="step-indicator">2</div>
          <div>Audience</div>
        </div>
        <div class="step">
          <div class="step-indicator">3</div>
          <div>Schedule</div>
        </div>
        <div class="step">
          <div class="step-indicator">4</div>
          <div>Review</div>
        </div>
        <div class="step">
          <div class="step-indicator">5</div>
          <div>Launch</div>
        </div>
      </div>

      <div class="card">
        <h2>Define Target Audience</h2>
        <div class="content-grid">
          <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
              <div style="font-weight:700; color:#0f172a;">Select Brands</div>
              <button class="subtle-button">Select All</button>
            </div>
            <div class="brand-list">
              <div class="brand-item">Globe Prepaid</div>
              <div class="brand-item">TM</div>
              <div class="brand-item">Postpaid</div>
              <div class="brand-item">Broadband</div>
            </div>
          </div>

          <div class="card profile-card">
            <div style="width:100%; text-align:left;">
              <div style="font-size:1rem; font-weight:700; color:#0f172a; margin-bottom:16px;">Step 2: Customer Profile</div>
              <button type="button">+ Add Filter</button>
            </div>
          </div>

          <div class="summary-card">
            <h2>Audience Summary</h2>
            <div class="summary-ring">0</div>
            <div class="summary-footnote">
              <strong>Target Reach</strong>
              0% of Brand Base
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
