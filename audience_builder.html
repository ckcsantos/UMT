<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audience Builder</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #f1f5f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eff6ff;
    }

    .page-shell {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 32px 40px;
    }

    .hero {
      width: 100%;
      border-radius: 18px;
      background: #0f172a;
      padding: 32px;
      color: white;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.7rem);
      line-height: 1.1;
    }

    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .section-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .section-summary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #cbd5e1;
      background: white;
      color: #475569;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .section-summary:hover {
      background: #f1f5f9;
      border-color: #2563eb;
    }

    .section-summary strong {
      color: #0f172a;
      font-size: 1rem;
      font-weight: 800;
    }

    .back-button {
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .panel {
      margin-top: 24px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #f1f5f9;
    }

    .steps {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0;
      margin-bottom: 30px;
      padding: 0 12px;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      background: #e2e8f0;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
    }

    .steps::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 12px;
      height: 6px;
      background: #2563eb;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
      width: 28%;
    }

    .steps.progress-1::after {
      width: 8%;
    }

    .steps.progress-3::after {
      width: 52%;
    }

    .steps.progress-4::after {
      width: 76%;
    }

    .steps.progress-5::after {
      width: 100%;
    }

    .step {
      position: relative;
      flex: 1;
      text-align: center;
      color: #94a3b8;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .step-indicator {
      position: relative;
      z-index: 2;
      width: 34px;
      height: 34px;
      margin: 0 auto 10px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #475569;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.65);
    }

    .step.active .step-indicator,
    .step.active {
      color: #2563eb;
    }

    .step.active .step-indicator {
      background: #2563eb;
      color: white;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 20px;
      font-size: 1.1rem;
      color: #0f172a;
    }

    .subtle-button {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: white;
      color: #1e293b;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .subtle-button:hover {
      background: #eef2ff;
      border-color: #93c5fd;
    }

    .brand-list {
      display: grid;
      gap: 12px;
    }

    .brand-item {
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: white;
      padding: 16px 18px;
      color: #475569;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .brand-item:hover {
      background: #eef2ff;
      border-color: #93c5fd;
    }

    .brand-item.selected {
      background: #2563eb;
      border-color: #1d4ed8;
      color: white;
    }

    .profile-card {
      min-height: 260px;
      max-height: 440px;
      display: grid;
      place-items: center;
      color: #475569;
      font-size: 0.98rem;
      overflow: hidden;
    }

    .profile-card > div {
      width: 100%;
      overflow-y: auto;
      max-height: 100%;
      padding-right: 8px;
    }

    .profile-card button {
      width: 100%;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      background: transparent;
      color: #334155;
      padding: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .profile-card button:hover {
      background: #eff6ff;
      border-color: #93c5fd;
    }

    .filter-builder {
      margin-top: 22px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      background: white;
      display: none;
      gap: 16px;
    }

    .filter-group {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      background: #f8fafc;
      display: grid;
      gap: 14px;
    }

    .filter-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .group-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .connector-select {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: white;
      padding: 10px 14px;
      color: #0f172a;
      font-weight: 700;
    }

    .group-title {
      font-weight: 700;
      color: #0f172a;
    }

    .add-group-filter,
    .add-subgroup-button,
    .remove-group {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: white;
      color: #334155;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s ease;
    }

    .remove-group {
      margin-left: 8px;
    }

    .add-group-filter:hover,
    .add-subgroup-button:hover,
    .remove-group:hover {
      background: #f1f5f9;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1.25fr auto;
      gap: 12px;
      align-items: center;
    }

    .filter-row select,
    .filter-row input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.95rem;
      color: #0f172a;
      background: #f8fafc;
    }

    .filter-row select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #64748b 50%), linear-gradient(135deg, #64748b 50%, transparent 50%);
      background-position: calc(100% - 16px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px);
      background-size: 8px 8px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    .filter-builder.visible {
      display: grid;
    }

    .filter-builder label {
      font-size: 0.88rem;
      color: #475569;
      font-weight: 700;
    }

    .filter-builder .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
    }

    .filter-builder .filter-header button {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: white;
      color: #334155;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .filter-builder .filter-header button:hover {
      background: #f1f5f9;
    }

    .filter-row button {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: white;
      color: #334155;
      padding: 0 12px;
      min-height: 44px;
      cursor: pointer;
      font-weight: 700;
    }

    .filter-row button:hover {
      background: #f1f5f9;
    }

    .summary-card {
      border: 1px solid #cbd5e1;
      border-radius: 20px;
      background: white;
      padding: 24px;
      display: grid;
      gap: 22px;
      text-align: center;
    }

    .summary-card h2 {
      margin: 0;
      font-size: 1.05rem;
      color: #1e293b;
    }

    .summary-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      border-radius: 999px;
      border: 10px solid #e2e8f0;
      display: grid;
      place-items: center;
      color: #0f172a;
      font-size: 2rem;
      font-weight: 800;
    }

    .summary-footnote {
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      color: #475569;
      font-size: 0.95rem;
    }

    .summary-footnote strong {
      display: block;
      margin-bottom: 8px;
      color: #0f172a;
      font-size: 1rem;
    }

    @media (max-width: 980px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 20px;
      }

      .steps {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <div class="hero-header">
        <h1>Audience Builder</h1>
        <button type="button" class="back-button" onclick="window.location.href='campaign_creation.html'">Back to Campaign Creation</button>
      </div>
    </section>

    <section class="panel">
      <div class="steps progress-2">
        <div class="step active">
          <div class="step-indicator">1</div>
          <div>Details</div>
        </div>
        <div class="step active">
          <div class="step-indicator">2</div>
          <div>Audience</div>
        </div>
        <div class="step">
          <div class="step-indicator">3</div>
          <div>Schedule</div>
        </div>
        <div class="step">
          <div class="step-indicator">4</div>
          <div>Review</div>
        </div>
        <div class="step">
          <div class="step-indicator">5</div>
          <div>Launch</div>
        </div>
      </div>

      <div class="card">
        <div class="section-top">
          <h2>Define Target Audience</h2>
          <div class="section-summary" id="audienceCount">Audience total: <strong>0</strong></div>
          <button type="button" class="subtle-button" id="previewButton">Preview</button>
        </div>
        <div class="content-grid">
          <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
              <div style="font-weight:700; color:#0f172a;">Select Brands</div>
              <button class="subtle-button">Select All</button>
            </div>
            <div class="brand-list">
              <div class="brand-item">Globe Prepaid</div>
              <div class="brand-item">TM</div>
              <div class="brand-item">Postpaid</div>
              <div class="brand-item">Broadband</div>
            </div>
          </div>

          <div class="card profile-card">
            <div style="width:100%; text-align:left;">
               <div style="font-size:1rem; font-weight:700; color:#0f172a; margin-bottom:16px;">Step 2: Customer Profile</div>
              <button type="button" id="addFilterButton" style="width:100%; border:1px dashed #cbd5e1; border-radius:16px; background:transparent; color:#334155; padding:18px; font-weight:700; cursor:pointer; margin-bottom:16px;">+ Add Filter</button>
              <div class="filter-builder" id="filterBuilder">
                <div class="filter-header">
                  <span>Customer Profile Filters</span>
                  <button type="button" class="add-subgroup-button" id="addGroupButton">+ Add subgroup</button>
                </div>
                <div id="groupsContainer"></div>
              </div>
              <div class="query-preview" id="queryPreview" style="display:none; margin-top:22px; border:1px solid #e2e8f0; border-radius:16px; padding:18px; background:#f8fafc;">
                <div style="font-size:1rem; font-weight:700; color:#0f172a; margin-bottom:12px;">Query Preview</div>
                <pre id="queryText" style="margin:0; font-family:monospace; font-size:0.95rem; color:#334155; white-space:pre-wrap; word-break:break-all;"></pre>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </div>
  <script>
    const addFilterButton = document.getElementById('addFilterButton');
    const addGroupButton = document.getElementById('addGroupButton');
    const filterBuilder = document.getElementById('filterBuilder');
    const groupsContainer = document.getElementById('groupsContainer');
    const previewButton = document.getElementById('previewButton');
    const queryPreview = document.getElementById('queryPreview');
    const queryText = document.getElementById('queryText');

    const filterOptions = `
      <select aria-label="Attribute">
        <option value="age">Age</option>
        <option value="location">Location</option>
        <option value="gender">Gender</option>
        <option value="plan">Plan Type</option>
        <option value="engagement">Engagement</option>
      </select>
      <select aria-label="Operator">
        <option value="equals">Equals</option>
        <option value="not_equals">Not Equals</option>
        <option value="contains">Contains</option>
        <option value="greater_than">Greater Than</option>
        <option value="less_than">Less Than</option>
      </select>
      <input type="text" placeholder="Value" aria-label="Value" />
      <button type="button" class="remove-row" aria-label="Remove filter">🗑️</button>
    `;

    let groupIndex = 0;

    function createFilterRow() {
      const row = document.createElement('div');
      row.className = 'filter-row';
      row.innerHTML = filterOptions;
      return row;
    }

    function addGroup() {
      filterBuilder.classList.add('visible');
      groupIndex += 1;

      const group = document.createElement('div');
      group.className = 'filter-group';
      group.dataset.groupId = groupIndex;
      group.innerHTML = `
        <div class="filter-group-header">
          <span class="group-title">Group ${groupIndex}</span>
          <div class="group-actions">
            <label for="connector-${groupIndex}">Connect with</label>
            <select id="connector-${groupIndex}" class="connector-select" aria-label="Connector">
              <option value="and">AND</option>
              <option value="or">OR</option>
            </select>
            <button type="button" class="remove-group" aria-label="Remove subgroup">🗑️</button>
          </div>
        </div>
        <div class="filter-rows"></div>
        <button type="button" class="add-group-filter">+ Add Filter</button>
      `;

      groupsContainer.appendChild(group);
      const rowsContainer = group.querySelector('.filter-rows');
      rowsContainer.appendChild(createFilterRow());
    }

    function addFilter() {
      if (!groupsContainer.children.length) {
        addGroup();
        return;
      }
      filterBuilder.classList.add('visible');
      const groups = groupsContainer.querySelectorAll('.filter-group');
      const lastGroup = groups[groups.length - 1];
      const rowsContainer = lastGroup.querySelector('.filter-rows');
      rowsContainer.appendChild(createFilterRow());
    }

    addFilterButton.addEventListener('click', () => {
      addFilter();
    });

    addGroupButton.addEventListener('click', () => {
      addGroup();
    });

    groupsContainer.addEventListener('click', (event) => {
      if (event.target.classList.contains('remove-row')) {
        const row = event.target.closest('.filter-row');
        if (row) {
          const rowsContainer = row.closest('.filter-rows');
          row.remove();
          if (rowsContainer && !rowsContainer.children.length) {
            const group = rowsContainer.closest('.filter-group');
            if (group) {
              group.remove();
            }
          }
        }
      }

      if (event.target.classList.contains('remove-group')) {
        const group = event.target.closest('.filter-group');
        if (group) {
          group.remove();
        }
      }

      if (event.target.classList.contains('add-group-filter')) {
        const group = event.target.closest('.filter-group');
        if (group) {
          const rowsContainer = group.querySelector('.filter-rows');
          rowsContainer.appendChild(createFilterRow());
        }
      }

      if (!groupsContainer.children.length) {
        filterBuilder.classList.remove('visible');
      }
    });

    const brandList = document.querySelector('.brand-list');
    if (brandList) {
      brandList.addEventListener('click', (event) => {
        const item = event.target.closest('.brand-item');
        if (item) {
          item.classList.toggle('selected');
        }
      });
    }

    function showQueryPreview() {
      const groups = groupsContainer.querySelectorAll('.filter-group');
      if (!groups.length) {
        queryText.textContent = 'No filter rules defined. Add a filter group to see a preview.';
        queryPreview.style.display = 'block';
        return;
      }

      const opLabels = {
        equals: 'eq', not_equals: 'neq',
        contains: 'contains', greater_than: '>', less_than: '<'
      };

      const opWords = {
        equals: 'is', not_equals: 'is not',
        contains: 'contains', greater_than: 'is greater than', less_than: 'is less than'
      };

      const attrLabels = {
        age: 'Age', location: 'Location',
        gender: 'Gender', plan: 'Plan Type', engagement: 'Engagement'
      };

      const lines = [];

      // -- brands --
      const selectedBrands = Array.from(document.querySelectorAll('.brand-item.selected')).map(el => el.textContent.trim());
      if (selectedBrands.length) {
        lines.push(['BRANDS'].concat(selectedBrands.map(b => `  • ${b}`)).join('\n'));
        lines.push('');
      }

      // -- filter groups --
      groups.forEach(group => {
        const connector = group.querySelector('.connector-select')?.value || 'and';
        const rows = group.querySelectorAll('.filter-row');
        const rowParts = [];
        rows.forEach(row => {
          const attr = row.querySelector('[aria-label="Attribute"]')?.value;
          const op   = row.querySelector('[aria-label="Operator"]')?.value;
          const val  = row.querySelector('[aria-label="Value"]')?.value;
          if (attr && op && val) rowParts.push(`${attrLabels[attr] || attr} ${opWords[op] || op} "${val}"`);
        });
        if (!rowParts.length) return;
        lines.push(`${connector.toUpperCase()} GROUP:`);
        rowParts.forEach((p, i) => lines.push(`  ${i+1}. ${p}`));
        lines.push('');
      });

      if (!lines.length) {
        queryText.textContent = 'Select brands and add filter rules, then click Preview.';
      } else {
        queryText.textContent = lines.join('\n').trim();
      }
      queryPreview.style.display = 'block';
    }

    function estimateAudience() {
      const selectedBrands = Array.from(document.querySelectorAll('.brand-item.selected')).map(el => el.textContent.trim());
      const groups = groupsContainer.querySelectorAll('.filter-group');
      const filterCount = groups.length > 0
        ? Array.from(groups).reduce((sum, g) => sum + g.querySelectorAll('.filter-row').length, 0)
        : 0;
      const base = selectedBrands.length * 50000;
      const factor = filterCount > 0 ? 1 - (filterCount * 0.15) : 1;
      return Math.round(base * Math.max(factor, 0.3));
    }

    function updateAudienceCount() {
      const count = estimateAudience();
      document.querySelector('#audienceCount strong').textContent = count.toLocaleString();
    }

    previewButton.addEventListener('click', () => { showQueryPreview(); updateAudienceCount(); });

    audienceCount.addEventListener('click', () => { showQueryPreview(); });
  </script>
</body>
</html>
