<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(16px);
      border-radius: 22px;
      width: min(420px, 100%);
      padding: 36px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
    }

    .login-card h1 {
      font-size: 1.9rem;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .login-card p {
      margin-bottom: 28px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #e5e7eb;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(15, 23, 42, 0.7);
      color: #f8fafc;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      color: #d1d5db;
    }

    .login-button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #f8fafc;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .login-button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    .footer a {
      color: #93c5fd;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Sign in to your account</h1>
    <p>Enter your email and password to access your dashboard. Keep your credentials secure and private.</p>

    <form onsubmit="return validateLogin()" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="text" id="email" name="email" placeholder="admin" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8" />
      </div>

      <div class="remember">
        <input type="checkbox" id="remember" name="remember" />
        <label for="remember">Remember me</label>
      </div>

      <button type="submit" class="login-button">Log in</button>
    </form>

    <div class="footer">
      <p>Need help? <a href="#">Reset your password</a></p>
    </div>
  </main>

  <script>
    function validateLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (email === 'admin' && password === 'admin') {
        window.location.href = 'dashboard.html';
        return false;
      }

      alert('Invalid credentials. Use admin / admin to sign in.');
      return false;
    }
  </script>
</body>
</html>
