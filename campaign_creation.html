<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign Creation</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eff6ff;
    }

    .page-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px;
    }

    .hero {
      width: 100%;
      border-radius: 18px;
      background: #0f172a;
      color: white;
      padding: 32px 32px 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }

    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.7rem);
      letter-spacing: -0.03em;
    }

    .back-button {
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .panel {
      margin-top: 24px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .steps {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
      padding: 0 12px;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      background: #e2e8f0;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
    }

    .steps::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 12px;
      height: 6px;
      background: #2563eb;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
      width: 8%;
    }

    .steps.progress-2::after {
      width: 28%;
    }

    .steps.progress-3::after {
      width: 52%;
    }

    .steps.progress-4::after {
      width: 76%;
    }

    .steps.progress-5::after {
      width: 100%;
    }

    .step {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .step-indicator {
      position: relative;
      z-index: 2;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      background: #e2e8f0;
      color: #475569;
      font-weight: 800;
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.65);
    }

    .step.active .step-indicator {
      background: #2563eb;
      color: white;
    }

    .form-grid {
      display: grid;
      gap: 24px;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    label {
      font-weight: 700;
      color: #1e293b;
    }

    .required {
      color: #dc2626;
      margin-left: 4px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: #f8fafc;
      color: #0f172a;
      padding: 14px 16px;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .help-text {
      color: #64748b;
      font-size: 0.9rem;
      text-align: right;
    }

    .button-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .submit-button {
      border: none;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .submit-button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    @media (max-width: 820px) {
      .steps {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .steps {
        grid-template-columns: repeat(2, 1fr);
      }

      .page-shell {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <div class="hero-header">
        <h1>Campaign Creation</h1>
        <button type="button" class="back-button" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
      </div>
    </section>

    <section class="panel">
      <div class="steps progress-1">
        <div class="step active">
          <div class="step-indicator">1</div>
          <div>Details</div>
        </div>
        <div class="step">
          <div class="step-indicator">2</div>
          <div>Audience</div>
        </div>
        <div class="step">
          <div class="step-indicator">3</div>
          <div>Schedule</div>
        </div>
        <div class="step">
          <div class="step-indicator">4</div>
          <div>Review</div>
        </div>
        <div class="step">
          <div class="step-indicator">5</div>
          <div>Launch</div>
        </div>
      </div>

      <form action="#" method="post">
        <div class="form-grid">
          <div class="field">
            <label for="campaignName">Campaign Name</label>
            <input id="campaignName" name="campaignName" type="text" placeholder="Enter campaign name" />
          </div>

          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" name="description" maxlength="250" placeholder="Describe the campaign"></textarea>
            <div class="help-text" id="descriptionHelp">250 characters remaining</div>
          </div>

          <div class="field">
            <label for="campaignType">Campaign Type</label>
            <select id="campaignType" name="campaignType">
              <option value="">Select a type</option>
              <option>Blast</option>
              <option>Top-up & Get</option>
              <option>Register & Get</option>
              <option>Spend & Get</option>
              <option>Pull KW</option>
            </select>
          </div>

          <div class="field">
            <label for="campaignSquad">Campaign Squad</label>
            <select id="campaignSquad" name="campaignSquad">
              <option value="">Select a squad</option>
              <option>Core Growth</option>
              <option>Retention</option>
              <option>Product</option>
              <option>Operations</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button type="button" class="submit-button" onclick="window.location.href='audience_builder.html'">Next</button>
        </div>
      </form>
    </section>
  </div>

  <script>
    const descriptionInput = document.getElementById('description');
    const descriptionHelp = document.getElementById('descriptionHelp');

    descriptionInput.addEventListener('input', () => {
      const remaining = 250 - descriptionInput.value.length;
      descriptionHelp.textContent = `${remaining} characters remaining`;
    });
  </script>
</body>
</html>
