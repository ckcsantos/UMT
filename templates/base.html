<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}UMT{% endblock %}</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #eef2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: #eff6ff;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      background: #0f172a;
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1e293b;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 32px 24px;
      font-size: 1.25rem;
      color: white;
    }

    .sidebar-header strong { font-weight: 800; }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 16px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s, color 0.2s;
      position: relative;
    }

    .nav-link svg {
      width: 18px;
      height: 18px;
      margin-right: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-link.active { color: white; }

    .nav-link .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #14b8a6;
      box-shadow: 0 0 8px #14b8a6;
      position: absolute;
      right: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .nav-link.active .dot,
    .nav-link:hover .dot { opacity: 1; }

    .new-campaign-btn {
      margin: 24px 16px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .new-campaign-btn:hover { background: rgba(255,255,255,0.15); }

    .sidebar-footer {
      margin-top: auto;
      padding: 24px;
      border-top: 1px solid #1e293b;
      font-size: 0.85rem;
      color: #64748b;
    }

    .sidebar-footer span {
      display: block;
      color: white;
      font-weight: 500;
      margin-top: 4px;
    }

    .sign-out-btn {
      margin-top: 14px;
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #94a3b8;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }

    .sign-out-btn:hover { background: rgba(255,255,255,0.05); color: white; }

    /* ── Main layout ─────────────────────────────────────── */
    .main-layout {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
    }

    .page-shell {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 32px 40px;
    }

    /* ── Hero ────────────────────────────────────────────── */
    .hero {
      width: 100%;
      border-radius: 18px;
      background: #0f172a;
      color: white;
      padding: 32px 32px 28px;
      box-shadow: 0 24px 60px rgba(15,23,42,0.18);
      margin-bottom: 32px;
    }

    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.7rem);
      letter-spacing: -0.03em;
    }

    .back-button {
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.1);
      color: white;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .back-button:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    .hero-create-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      color: white;
      background: #2563eb;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .hero-create-btn:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    /* ── Panel & Card ────────────────────────────────────── */
    .panel {
      margin-top: 24px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 24px rgba(15,23,42,0.06);
      border: 1px solid #f1f5f9;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 20px;
      font-size: 1.1rem;
      color: #0f172a;
    }

    /* ── Steps / Progress bar ────────────────────────────── */
    .steps {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
      padding: 0 12px;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      background: #e2e8f0;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
    }

    .steps::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 12px;
      height: 6px;
      background: #2563eb;
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 1;
      width: 0;
    }

    .steps.progress-1::after { width: 8%;   }
    .steps.progress-2::after { width: 28%;  }
    .steps.progress-3::after { width: 52%;  }
    .steps.progress-4::after { width: 76%;  }
    .steps.progress-5::after { width: 100%; }

    .step {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #94a3b8;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .step-indicator {
      position: relative;
      z-index: 2;
      width: 34px;
      height: 34px;
      margin: 0 auto 10px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #475569;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.65);
    }

    .step.active .step-indicator,
    .step.active { color: #2563eb; }

    .step.active .step-indicator {
      background: #2563eb;
      color: white;
    }

    /* ── Section header ──────────────────────────────────── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .section-header h2 {
      font-size: 1.1rem;
      color: #0f172a;
      font-weight: 700;
      margin: 0;
    }

    /* ── Tab switch ──────────────────────────────────────── */
    .tab-switch {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      overflow: hidden;
      background: white;
    }

    .tab-switch button {
      border: none;
      padding: 10px 18px;
      background: transparent;
      color: #475569;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .tab-switch button.active { background: #2563eb; color: white; }

    /* ── Table ───────────────────────────────────────────── */
    .table-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(15,23,42,0.06);
      border: 1px solid #eef2ff;
    }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: 18px 32px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.95rem;
    }

    thead { background: #f8fafc; }

    th {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f1f5f9; }

    /* ── Status & type pills ─────────────────────────────── */
    .status-pill,
    .type-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 7px 12px;
      white-space: nowrap;
    }

    .status-pill.active      { background: #dcfce7; color: #166534; }
    .status-pill.draft       { background: #e2e8f0; color: #334155; }
    .status-pill.deactivated { background: #fee2e2; color: #b91c1c; }
    .type-pill               { background: #eff6ff; color: #2563eb; }

    /* ── Row edit button ─────────────────────────────────── */
    .row-edit-btn {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: white;
      color: #475569;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .row-edit-btn:hover {
      background: #eff6ff;
      border-color: #2563eb;
      color: #1d4ed8;
    }

    /* ── Primary button / button row ────────────────────── */
    .button-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .primary-btn {
      border: none;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .primary-btn:hover { background: #1d4ed8; transform: translateY(-1px); }

    /* ── ON / OFF toggle (dashboard) ─────────────────────── */
    .actions-switch {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      overflow: hidden;
      background: #f8fafc;
    }

    .actions-switch button {
      border: none;
      padding: 8px 12px;
      background: transparent;
      color: #475569;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      min-width: 54px;
    }

    .actions-switch button.active { background: #2563eb; color: white; }

    /* ── Responsive table ────────────────────────────────── */
    @media (max-width: 820px) {
      th, td { padding: 14px 16px; }
    }

    @media (max-width: 640px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { position: absolute; top: -9999px; left: -9999px; }
      tr { margin-bottom: 18px; border-radius: 20px; background: white; box-shadow: 0 10px 24px rgba(15,23,42,0.06); }
      td { border: none; padding: 14px 18px; position: relative; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      td::before { content: attr(data-label); display: block; color: #64748b; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0; }
      td:first-child { font-weight: 700; color: #0f172a; font-size: 0.95rem; }
      .page-shell { padding: 24px; }
    }

  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <strong>ARROW</strong> <span style="font-weight:300;">UM Tool</span>
    </div>

    <div class="nav-links">
      <a href="/dashboard" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Dashboard
        <div class="dot"></div>
      </a>
      <a href="/campaigns" class="nav-link {% if active_page == 'campaigns' %}active{% endif %}">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
        Campaigns
        <div class="dot"></div>
      </a>
      <a href="/audience-builder" class="nav-link {% if active_page == 'audience' %}active{% endif %}">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Audience
        <div class="dot"></div>
      </a>
      <a href="/schedule" class="nav-link {% if active_page == 'schedule' %}active{% endif %}">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Schedule
        <div class="dot"></div>
      </a>
    </div>

    <div class="sidebar-footer">
      Logged in as
      <span>{{ user_email }}</span>
      <a href="/logout" class="sign-out-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sign out
      </a>
    </div>
  </aside>

  <main class="main-layout">
    {% block content %}{% endblock %}
  </main>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
